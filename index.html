//text script for front end ui
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TakeBack</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup-container">
    <!-- Left Sidebar with Presets -->
    <div class="sidebar">
      <div class="preset-buttons">
        <button class="preset-btn active" data-preset="0">1</button>
        <button class="preset-btn" data-preset="1">2</button>
        <button class="preset-btn" data-preset="2">3</button>
        <button class="preset-btn" data-preset="3">4</button>
        <button class="preset-btn" data-preset="4">5</button>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Header -->
      <div class="header">
        <div class="preset-info">
          <div class="preset-icon"></div>
          <span class="preset-name" id="presetName" contenteditable="true">Untitled #1</span>
        </div>
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 4L8 12L16 20" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8 4L0 12L8 20" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <!-- Content Panels -->
      <div class="content-panels">
        <!-- Whitelist Panel -->
        <div class="panel whitelist-panel">
          <div class="panel-header">
            <span class="panel-label">Whitelist</span>
          </div>
          <div class="panel-content">
            <div class="list-items" id="whitelistItems" contenteditable="true">
            </div>
          </div>
        </div>

        <!-- Blacklist Panel -->
        <div class="panel blacklist-panel">
          <div class="panel-header">
            <span class="panel-label">Blacklist</span>
          </div>
          <div class="panel-content">
            <div class="list-items" id="blacklistItems" contenteditable="true">
            </div>
          </div>
        </div>
      </div>

      <!-- Strength Slider -->
      <div class="strength-section">
        <span class="strength-label">Strength</span>
        <div class="slider-container">
          <input type="range" id="strictnessSlider" class="strength-slider" min="0" max="100" value="50" step="1">
          <span class="strength-value" id="strictnessValue">Moderate</span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
      <button class="btn btn-continue" id="continueBtn">Continue</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
