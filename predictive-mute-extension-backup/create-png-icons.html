<!DOCTYPE html>
<html>
<head>
  <title>Icon Generator</title>
</head>
<body>
  <h2>Predictive Mute - Icon Generator</h2>
  <p>Right-click each canvas and "Save image as..." to create PNG icons</p>

  <div>
    <h3>icon16.png</h3>
    <canvas id="canvas16" width="16" height="16"></canvas>
  </div>

  <div>
    <h3>icon48.png</h3>
    <canvas id="canvas48" width="48" height="48"></canvas>
  </div>

  <div>
    <h3>icon128.png</h3>
    <canvas id="canvas128" width="128" height="128"></canvas>
  </div>

  <script>
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');

      // Background with rounded corners
      ctx.fillStyle = '#4285f4';
      ctx.beginPath();
      const radius = size * 0.2;
      ctx.roundRect(0, 0, size, size, radius);
      ctx.fill();

      // Shield
      ctx.fillStyle = 'white';
      ctx.beginPath();
      const shieldScale = size / 80;
      ctx.moveTo(size * 0.5, size * 0.2);
      ctx.lineTo(size * 0.7, size * 0.3);
      ctx.lineTo(size * 0.7, size * 0.5);
      ctx.quadraticCurveTo(size * 0.7, size * 0.7, size * 0.5, size * 0.75);
      ctx.quadraticCurveTo(size * 0.3, size * 0.7, size * 0.3, size * 0.5);
      ctx.lineTo(size * 0.3, size * 0.3);
      ctx.closePath();
      ctx.fill();

      // Mute circle
      ctx.fillStyle = '#dc3545';
      ctx.beginPath();
      ctx.arc(size * 0.75, size * 0.75, size * 0.12, 0, 2 * Math.PI);
      ctx.fill();

      // Mute slash
      ctx.strokeStyle = 'white';
      ctx.lineWidth = size * 0.03;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(size * 0.68, size * 0.68);
      ctx.lineTo(size * 0.82, size * 0.82);
      ctx.stroke();
    }

    // Draw icons
    drawIcon(document.getElementById('canvas16'), 16);
    drawIcon(document.getElementById('canvas48'), 48);
    drawIcon(document.getElementById('canvas128'), 128);

    // Auto-download function
    function downloadCanvas(canvas, filename) {
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // Add download buttons
    document.querySelectorAll('canvas').forEach(canvas => {
      const btn = document.createElement('button');
      btn.textContent = 'Download';
      btn.style.marginLeft = '10px';
      btn.onclick = () => {
        const size = canvas.id.replace('canvas', '');
        downloadCanvas(canvas, `icon${size}.png`);
      };
      canvas.parentElement.appendChild(btn);
    });
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    canvas {
      border: 2px solid #ddd;
      background: white;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    div {
      margin: 20px 0;
      padding: 15px;
      background: white;
      border-radius: 8px;
      display: inline-block;
      margin-right: 20px;
    }
    button {
      padding: 8px 16px;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #3367d6;
    }
  </style>
</body>
</html>
